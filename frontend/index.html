<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Engine Frontend</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- jQuery (required by chessboard.js) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Chessboard.js -->
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <!-- Chess.js (Rules Engine) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        h1 { margin-bottom: 10px; font-weight: 600; color: #ffeb3b; }
        .container { display: flex; gap: 40px; align-items: flex-start; background: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .controls { display: flex; flex-direction: column; gap: 15px; min-width: 250px; }
        button { background: #3f51b5; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        button:hover { background: #5c6bc0; }
        button:disabled { background: #555; cursor: not-allowed; }
        .status { padding: 15px; background: #2c2c2c; border-radius: 6px; font-size: 14px; white-space: pre-wrap; font-family: monospace; }
        #myBoard { width: 400px; border: 4px solid #333; border-radius: 4px; }
        .social-links-left { position: fixed; bottom: 30px; left: 30px; display: flex; flex-direction: column; gap: 15px; }
        .social-icon { display: flex; justify-content: center; align-items: center; width: 45px; height: 45px; border-radius: 50%; background: #2c2c2c; color: #fff; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 4px 10px rgba(0,0,0,0.5); cursor: pointer; text-decoration: none; }
        .social-icon svg { width: 22px; height: 22px; fill: currentColor; transition: transform 0.3s; }
        .social-icon:hover { transform: translateY(-5px) scale(1.1); box-shadow: 0 8px 15px rgba(0,0,0,0.6); }
        .social-icon.github:hover { background: #333; color: #fff; }
        .social-icon.linkedin:hover { background: #0077b5; color: #fff; }
        .social-icon.lichess:hover { background: #444; color: #fff; }
        .social-icon:hover svg { transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        // IMPORTANT: Replace 'https://chess-backend-xxxx.onrender.com' with your actual Render backend URL after deployment.
        const RENDER_API_URL = "https://chess-engine-backend.onrender.com"; 
        const API_BASE = isLocal ? "http://localhost:8080/api/engine" : `${RENDER_API_URL}/api/engine`;

        function ChessApp() {
            const [engineStatus, setEngineStatus] = useState("Initializing...");
            const [isThinking, setIsThinking] = useState(false);
            const [gameResult, setGameResult] = useState("");
            const [isConnected, setIsConnected] = useState(false);
            const [showDeploySuccess, setShowDeploySuccess] = useState(false);
            
            const boardRef = useRef(null);
            const gameRef = useRef(new Chess());

            useEffect(() => {
                const checkConnection = async () => {
                    try {
                        const res = await fetch(`${API_BASE}/init`, { method: "POST" });
                        if (res.ok) {
                            setIsConnected(prev => {
                                if (!prev) {
                                    setShowDeploySuccess(true);
                                }
                                return true;
                            });
                        } else {
                            setIsConnected(false);
                        }
                    } catch (e) {
                        setIsConnected(false);
                    }
                };
                checkConnection();
                const intervalId = setInterval(checkConnection, 3000);
                return () => clearInterval(intervalId);
            }, []);

            useEffect(() => {
                const handleKeyDown = () => setShowDeploySuccess(false);
                if (showDeploySuccess) {
                    window.addEventListener('keydown', handleKeyDown);
                }
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [showDeploySuccess]);

            // --- API Calls ---
            const initEngine = async () => {
                await fetch(`${API_BASE}/init`, { method: "POST" });
                const res = await fetch(`${API_BASE}/status`);
                const data = await res.json();
                setEngineStatus(`Engine: ${data.engineName}\nAuthor: ${data.engineAuthor}`);
            };

            const makeEngineMove = async () => {
                setIsThinking(true);
                setEngineStatus("Engine is thinking...");
                try {
                    const res = await fetch(`${API_BASE}/bestmove`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ fen: gameRef.current.fen(), depth: 5, timeMs: 1000 })
                    });
                    const data = await res.json();
                    
                    if (data.bestMove) {
                        // The backend returns strings like "e2e4". We parse it for chess.js
                        const from = data.bestMove.substring(0, 2);
                        const to = data.bestMove.substring(2, 4);
                        const promotion = data.bestMove.length > 4 ? data.bestMove[4] : undefined;

                        gameRef.current.move({ from, to, promotion });
                        boardRef.current.position(gameRef.current.fen());
                        updateStatus();
                    }
                } catch (e) {
                    console.error("Engine failure", e);
                }
                setIsThinking(false);
            };

            const resetGame = async () => {
                await fetch(`${API_BASE}/reset`, { method: "POST" });
                gameRef.current.reset();
                boardRef.current.start();
                updateStatus();
            };

            // --- Chessboard.js Logic ---
            useEffect(() => {
                initEngine();
                
                const onDragStart = (source, piece) => {
                    if (gameRef.current.game_over() || isThinking) return false;
                    // Only allow white to move
                    if (piece.search(/^b/) !== -1) return false;
                };

                const onDrop = (source, target) => {
                    // Try to make the move
                    const move = gameRef.current.move({
                        from: source,
                        to: target,
                        promotion: 'q' // Always promote to queen for simplicity
                    });

                    // Illegal move
                    if (move === null) return 'snapback';

                    updateStatus();
                    
                    // Trigger engine response
                    setTimeout(makeEngineMove, 250);
                };

                const onSnapEnd = () => {
                    boardRef.current.position(gameRef.current.fen());
                };

                boardRef.current = Chessboard('myBoard', {
                    draggable: true,
                    position: 'start',
                    onDragStart: onDragStart,
                    onDrop: onDrop,
                    onSnapEnd: onSnapEnd,
                    pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
                });
            }, []);

            const updateStatus = () => {
                let status = '';
                let moveColor = gameRef.current.turn() === 'b' ? 'Black' : 'White';

                if (gameRef.current.in_checkmate()) {
                    status = `Game over, ${moveColor} is in checkmate.`;
                } else if (gameRef.current.in_draw()) {
                    status = 'Game over, drawn position';
                } else {
                    status = `${moveColor} to move`;
                    if (gameRef.current.in_check()) status += ', ' + moveColor + ' is in check';
                }
                setGameResult(status);
                setEngineStatus(isThinking ? "Engine is thinking..." : "Ready");
            };

            return (
                <>
                    {showDeploySuccess && (
                        <div 
                            onClick={() => setShowDeploySuccess(false)}
                            style={{
                                position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
                                zIndex: 9998, background: 'rgba(0,0,0,0.6)',
                                display: 'flex', justifyContent: 'center', alignItems: 'center'
                            }}>
                            <div 
                                onClick={(e) => e.stopPropagation()}
                                style={{
                                    position: 'relative',
                                    background: 'linear-gradient(135deg, #4CAF50, #2E7D32)', color: 'white', 
                                    padding: '40px 60px', borderRadius: '15px', zIndex: 9999, textAlign: 'center',
                                    boxShadow: '0 20px 50px rgba(0,0,0,0.8)', border: '5px solid #81C784',
                                    animation: 'popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)'
                            }}>
                                <button onClick={() => setShowDeploySuccess(false)} style={{ position: 'absolute', top: '10px', right: '15px', background: 'transparent', border: 'none', color: 'white', fontSize: '24px', cursor: 'pointer', fontWeight: 'bold' }}>&times;</button>
                                <h1 style={{ fontSize: '3em', margin: '0 0 15px 0', textShadow: '2px 2px 4px rgba(0,0,0,0.5)' }}>🎉 DEPLOYMENT COMPLETED! 🎉</h1>
                                <h2 style={{ fontSize: '2em', margin: 0, fontWeight: 'normal' }}>You can play with <strong style={{color: '#FFEB3B'}}>Sarun_2_7</strong> now! ♟️</h2>
                                <p style={{ marginTop: '20px', fontSize: '16px', opacity: 0.8 }}>(Press any key or click anywhere to dismiss)</p>
                            </div>
                        </div>
                    )}
                    <style>{`
                        @keyframes popIn {
                            0% { opacity: 0; transform: scale(0.8); }
                            100% { opacity: 1; transform: scale(1); }
                        }
                    `}</style>
                    <div>
                        <h1>React C++ Chess GUI</h1>
                        <div className="container">
                            <div id="myBoard"></div>
                            <div className="controls">
                                <div className="status">
                                    <strong>System Status:</strong>
                                    <hr style={{borderColor: '#444'}}/>
                                    {engineStatus}
                                    <br/><br/>
                                    <strong>Game Status:</strong>
                                    <hr style={{borderColor: '#444'}}/>
                                    {gameResult || "White to move"}
                                </div>
                                <button onClick={resetGame} disabled={isThinking}>New Game</button>
                                <button 
                                    onClick={() => {
                                        const deployCmd = '@echo off\ncolor 0A\necho =========================================================================\necho             ALMOST THERE! STARTING BACKEND ENGINE...\necho =========================================================================\necho  *** Wait for the "Started ChessEngineBackendApplication" message ***\necho  ***   Once you see it, you can PLAY WITH SARUN_2_7 in your app!  ***\necho =========================================================================\n' + String.fromCharCode(27) + '[94m\necho *************************************************************************\necho ***                                                                   ***\necho ***                       MINIMIZE THE TERMINAL                       ***\necho ***                                                                   ***\necho *************************************************************************\n' + String.fromCharCode(27) + '[92m\nif not exist "CHESS-Engine" (\n  git clone https://github.com/Nit2007/CHESS-Engine.git\n)\ncd CHESS-Engine/backend\ncall mvnw.cmd clean spring-boot:run\npause';
                                        const blob = new Blob([deployCmd], { type: 'text/plain' });
                                        const url = URL.createObjectURL(blob);
                                        const a = document.createElement('a');
                                        a.href = url;
                                        a.download = 'run_chess_engine.bat';
                                        document.body.appendChild(a);
                                        a.click();
                                        document.body.removeChild(a);
                                        URL.revokeObjectURL(url);
                                        
                                        navigator.clipboard.writeText('git clone https://github.com/Nit2007/CHESS-Engine.git || true && cd CHESS-Engine/backend && ./mvnw clean spring-boot:run');
                                        alert("Downloaded 'run_chess_engine.bat'!\n\nJust double-click the downloaded file to auto-open your terminal and run the engine. (The command is also copied to your clipboard as a backup!)");
                                    }} 
                                    style={{ background: 'linear-gradient(45deg, #FFD700, #F39C12)', color: '#000', border: '1px solid #E67E22', boxShadow: '0 4px 15px rgba(243, 156, 18, 0.4)' }}
                                >
                                    ⚡ Self Deploy <span style={{fontSize: '12px'}}>(For better performance)</span>
                                </button>
                            </div>
                                    a.href = url;
                                    a.download = 'run_chess_engine.bat';
                                    document.body.appendChild(a);
                                    a.click();
                                    document.body.removeChild(a);
                                    URL.revokeObjectURL(url);
                                    
                                    navigator.clipboard.writeText('git clone https://github.com/Nit2007/CHESS-Engine.git || true && cd CHESS-Engine/backend && ./mvnw clean spring-boot:run');
                                    alert("Downloaded 'run_chess_engine.bat'!\n\nJust double-click the downloaded file to auto-open your terminal and run the engine using Maven. (The command is also copied to your clipboard as a backup!)");
                                }} 
                                style={{ background: 'linear-gradient(45deg, #FFD700, #F39C12)', color: '#000', border: '1px solid #E67E22', boxShadow: '0 4px 15px rgba(243, 156, 18, 0.4)' }}
                            >
                                ⚡ Self Deploy <span style={{fontSize: '12px'}}>(For better performance)</span>
                            </button>
                        </div>
                    </div>
                    
                    <div className="social-links-left">
                        <a href="https://github.com/Nit2007/CHESS-Engine" target="_blank" rel="noopener noreferrer" className="social-icon github">
                            <svg viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
                        </a>
                        <a href="https://www.linkedin.com/in/nithish-jaisarun-a-7256b932b/" target="_blank" rel="noopener noreferrer" className="social-icon linkedin">
                            <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                        </a>
                        <a href="https://lichess.org/@/Sarun_2_7" target="_blank" rel="noopener noreferrer" className="social-icon lichess">
                            <img src="https://cdn.simpleicons.org/lichess/white" alt="Lichess" style={{ width: '22px', height: '22px', display: 'block' }} />
                        </a>
                    </div>
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ChessApp />);
    </script>
</body>
</html>
