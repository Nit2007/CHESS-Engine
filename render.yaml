services:
  - type: worker
    name: lichess-bot
    env: python
    plan: free
    rootDir: lichess-bot
    buildCommand: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt

      make -C ../src || g++ -O2 -std=c++17 -I../src ../src/*.cpp -o ../src/chess

      mkdir -p engines
      cp ../src/chess engines/chess
      chmod +x engines/chess

      cat > config.render.yml << 'EOF'
      token: "RENDER_WILL_OVERRIDE"
      url: "https://lichess.org/"

      engine:
        dir: "./engines"
        name: "chess"
        protocol: "uci"
        ponder: true

      challenge:
        concurrency: 1
        sort_by: "best"
        preference: "none"
        accept_bot: true
        only_bot: false
        max_increment: 180
        min_increment: 0
        max_base: 1800
        min_base: 0
        max_days: 14
        min_days: 1
        variants:
          - standard
        time_controls:
          - bullet
          - blitz
          - rapid
          - classical
        modes:
          - casual
          - rated
      EOF
    startCommand: python lichess-bot.py --config config.render.yml --disable_auto_logging
    envVars:
      - key: LICHESS_BOT_TOKEN
        sync: false
